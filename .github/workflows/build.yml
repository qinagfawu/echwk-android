name: Build Module

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: 1.21

    - run: |
        git clone https://github.com/byJoey/ech-wk core
        cd core
        go mod init
        GOOS=android GOARCH=arm64 go build -o ech-workers
        cd ..

        mkdir module
        cp -r src/* module
        cp -r webui module
        cp -r api module

        mkdir -p module/system/bin
        cp core/ech-workers module/system/bin/

        cd module
        zip -r ../echwk-module.zip *

    - uses: actions/upload-artifact@v4
      with:
        name: echwk-module
        path: echwk-module.zip
